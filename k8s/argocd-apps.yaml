# ── ArgoCD App: Database ─────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devtask-database
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: HEAD
    path: k8s/database
  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ── ArgoCD App: Backend ───────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devtask-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: HEAD
    path: k8s/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ── ArgoCD App: Frontend ──────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devtask-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: HEAD
    path: k8s/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ── ArgoCD App: Ingress ───────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devtask-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: HEAD
    path: k8s
    directory:
      include: "ingress.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
